  <path d="M 38,10 L 32,30 L 58,30 L 52,10 Z"
        fill="#ffffff" stroke="#0a0a0a" stroke-width="3"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Wide trapezoidal skirt body -->
  <path d="M 10,92 L 24,32 L 66,32 L 80,92 Z"
        fill="#ffffff" stroke="#0a0a0a" stroke-width="3"
        stroke-linejoin="round" stroke-linecap="round"/>
</svg>
