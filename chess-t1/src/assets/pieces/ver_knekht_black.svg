<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <!-- Ver Knekht Black: Trapezoid body + small triangle top + 1 vertical line -->
  <!-- Triangle top -->
  <path d="M 25,5 L 20,18 L 40,18 L 35,5 Z"
        fill="#000000" stroke="#411B1A" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Trapezoid body -->
  <path d="M 13,72 L 18,20 L 42,20 L 47,72 Z"
        fill="#000000" stroke="#411B1A" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Center vertical line -->
  <line x1="30" y1="30" x2="30" y2="65"
        stroke="#FFFEF7" stroke-width="2.5" stroke-linecap="round"/>
</svg>
