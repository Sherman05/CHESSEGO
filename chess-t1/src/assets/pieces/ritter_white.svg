<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 100">
  <!-- Ritter White: Tower body + elliptical middle + 2 vertical lines (one shorter) -->
  <!-- Elliptical middle element -->
  <path d="M 26,28 A 20,13 0 0 1 64,28 L 64,38 L 26,38 Z"
        fill="#ffffff" stroke="#0a0a0a" stroke-width="3"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Tower body -->
  <path d="M 22,88 L 14,48 L 14,32 L 76,32 L 76,48 L 68,88 Z"
        fill="#ffffff" stroke="#0a0a0a" stroke-width="3"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Left vertical line (full) -->
  <line x1="40" y1="42" x2="40" y2="82"
        stroke="#000000" stroke-width="4" stroke-linecap="butt"/>
  <!-- Right vertical line (full) -->
  <line x1="52" y1="42" x2="52" y2="82"
        stroke="#000000" stroke-width="4" stroke-linecap="butt"/>
</svg>
