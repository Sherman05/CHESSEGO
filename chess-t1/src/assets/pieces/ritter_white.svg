        fill="#FFFFFF" stroke="#411B1A" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Left vertical line -->
  <line x1="24" y1="22" x2="24" y2="65"
        stroke="#411B1A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right vertical line -->
  <line x1="36" y1="22" x2="36" y2="65"
        stroke="#411B1A" stroke-width="2.5" stroke-linecap="round"/>
</svg>
