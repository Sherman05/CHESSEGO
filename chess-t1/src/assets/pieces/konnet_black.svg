<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 100">
  <!-- King Black: Octagonal crown + white belt + tower body + 3 vertical lines -->
  <!-- Octagonal/hexagonal crown -->
  <path d="M 30,18 L 24,24 L 24,34 L 30,40 L 60,40 L 66,34 L 66,24 L 60,18 Z"
        fill="#000000" stroke="#411b1a" stroke-width="3"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- White belt (inverted from white piece) -->
  <path d="M 16,46 A 18,5 0 0 1 74,46 L 74,52 L 16,52 Z"
        fill="#ffffff" stroke="#411b1a" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Tower body -->
  <path d="M 22,90 L 12,56 L 12,40 L 78,40 L 78,56 L 68,90 Z"
        fill="#000000" stroke="#411b1a" stroke-width="3"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Left vertical line -->
  <line x1="35" y1="56" x2="35" y2="84"
        stroke="#fffef7" stroke-width="4" stroke-linecap="butt"/>
  <!-- Center vertical line -->
  <line x1="45" y1="56" x2="45" y2="84"
        stroke="#fffef7" stroke-width="4" stroke-linecap="butt"/>
  <!-- Right vertical line -->
  <line x1="55" y1="56" x2="55" y2="84"
        stroke="#fffef7" stroke-width="4" stroke-linecap="butt"/>
</svg>
