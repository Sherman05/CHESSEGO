<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <!-- Konnet Black: LARGEST piece, circle-with-cross top + widest pentagon + 3 lines -->
  <!-- Circle with cross on top -->
  <circle cx="30" cy="6" r="5"
          fill="#000000" stroke="#411B1A" stroke-width="2.5"/>
  <line x1="30" y1="1" x2="30" y2="11"
        stroke="#FFFEF7" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="6" x2="35" y2="6"
        stroke="#FFFEF7" stroke-width="2" stroke-linecap="round"/>
  <!-- Pentagon body (widest) -->
  <path d="M 12,76 L 8,32 L 30,12 L 52,32 L 48,76 Z"
        fill="#000000" stroke="#411B1A" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Three vertical lines -->
  <line x1="22" y1="26" x2="22" y2="68"
        stroke="#FFFEF7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="26" x2="30" y2="68"
        stroke="#FFFEF7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="26" x2="38" y2="68"
        stroke="#FFFEF7" stroke-width="2.5" stroke-linecap="round"/>
</svg>
