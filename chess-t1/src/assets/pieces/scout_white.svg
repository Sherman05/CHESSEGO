<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <!-- Scout White: Circle top + wider pentagon body + wide vertical stripe -->
  <!-- Circle navershie -->
  <circle cx="30" cy="6" r="4"
          fill="#FFFFFF" stroke="#411B1A" stroke-width="2.5"/>
  <!-- Pentagon body (wider base) -->
  <path d="M 12,72 L 8,35 L 30,14 L 52,35 L 48,72 Z"
        fill="#FFFFFF" stroke="#411B1A" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Wide vertical stripe -->
  <rect x="27" y="28" width="6" height="38"
        fill="#411B1A"/>
</svg>
